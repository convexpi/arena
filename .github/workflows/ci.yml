name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest --tb=short -q

  rust-conformance:
    name: Rust L3 conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - uses: dtolnay/rust-toolchain@stable

      - name: Install package + build the Rust extension
        run: |
          pip install -e ".[dev]"
          pip install ./rust          # builds convexpi-arena-rs via maturin and installs it

      - name: Run conformance + benchmark
        run: pytest tests/arena/test_rust_conformance.py -q -s
