[build]
builder        = "dockerfile"
dockerfilePath = "deploy/Dockerfile"

[deploy]
# `python -m` invokes the package directly, so it works even if the console-script bin dir
# isn't on PATH (the cause of the earlier "convexpi-server: command not found" crash).
startCommand = "python -m convexpi.arena.server"
# No healthcheckPath: this is a WebSocket server on $PORT, which doesn't answer a plain HTTP GET /
# with a 200, so an HTTP healthcheck would always fail. Railway marks the deploy healthy once the
# container is up and listening on $PORT (which websockets.serve does).
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

# Every setting is configurable purely through Railway → Variables — no custom start command needed.
# (Each maps to a CLI flag that falls back to this env var; an explicit flag would still override.)
#   ARENA_TICK_INTERVAL    seconds per tick (default 1.0)
#   ARENA_RESPONSE_DEADLINE seconds to wait for remote orders per tick (default 0.5)
#   ARENA_N_TICKS          blank = forever (the right setting for an always-open ladder)
#   ARENA_SEED             RNG seed (default 1)
#   ARENA_INITIAL_CASH     starting equity per agent, dollars (default 1000)
#   ARENA_ADMIN_TOKEN      secret enabling instructor control; blank = admin DISABLED but UNAUTHED
#                          (anyone could connect as admin — always set this for a public server)
#   ARENA_MAX_DRAWDOWN     dollars before elimination (blank = off)
#   ARENA_POSITION_LIMIT   max absolute position before elimination (blank = off)
#
# Real order-book mode (the 'arena-book' season) — players trade against recorded L2 depth:
#   ARENA_CRYPTO_BOOK      path to an L2 depth JSONL (e.g. data/btcusd_book.jsonl, shipped in the
#                          image; or record one with deploy/fetch_crypto_orderbook.py)
#   ARENA_CRYPTO_L3        path to an L3 order-by-order JSONL (the realistic exchange: real FIFO
#                          queues + queue-based fills; record with deploy/fetch_crypto_l3.py)
#   ARENA_MAKER_FEE_BPS    maker fee in bps (negative = rebate; default 0)
#   ARENA_TAKER_FEE_BPS    taker fee in bps (default 0)
#
# Required to feed a live leaderboard (without these the server runs but writes
# NO rankings, so the /compete board stays empty):
#   SUPABASE_URL           Supabase project URL (NEXT_PUBLIC_SUPABASE_URL also accepted)
#   SUPABASE_SERVICE_KEY   service role key (bypasses RLS)
#   SUPABASE_SESSION_ID    the arena_sessions.id this server feeds (e.g. the 'arena-book' session)
